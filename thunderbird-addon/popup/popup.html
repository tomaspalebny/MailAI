<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MailAI Thunderbird</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <h1>MailAI</h1>

      <label>LLM API key</label>
      <input id="llmApiKey" type="password" placeholder="sk-..." />

      <label>LLM Base URL</label>
      <input id="llmBaseUrl" type="text" value="https://llm.ai.e-infra.cz/v1/" />

      <label>Model</label>
      <input id="model" type="text" placeholder="gpt-4o-mini" />

      <div class="row">
        <div>
          <label>Dny zpet</label>
          <input id="daysBack" type="number" min="1" max="30" value="10" />
        </div>
        <div>
          <label>Max emailu</label>
          <input id="maxItems" type="number" min="10" max="500" value="120" />
        </div>
      </div>

      <label>Custom prompt</label>
      <textarea id="customPrompt" rows="4"></textarea>

      <label>Preferovani odesilatele (radek nebo carka)</label>
      <textarea id="prioritySenders" rows="2"></textarea>

      <label class="checkbox">
        <input id="addDeadlineTag" type="checkbox" checked />
        Pridat tag MailAI/S terminem
      </label>

      <div class="buttons">
        <button id="saveBtn" class="secondary">Ulozit</button>
        <button id="analyzeBtn">Analyzovat neprectene</button>
        <button id="applyBtn" class="secondary">Aplikovat tagy + mark read</button>
      </div>

      <section id="status"></section>
      <section id="result"></section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
