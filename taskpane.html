<!DOCTYPE html>
<html lang="cs"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Email Triage AI</title><script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script><style>
body{font-family:Segoe UI,sans-serif;padding:14px;background:#fafafa;color:#1a1a1a}
.row{margin-bottom:10px}
label{display:block;font-size:12px;font-weight:600;margin-bottom:4px;color:#444}
input,textarea,select{width:100%;box-sizing:border-box;padding:8px;border:1px solid #d0d0d0;border-radius:6px;background:#fff}
textarea{resize:vertical}
.btn{padding:8px 12px;border:0;background:#0078d4;color:#fff;border-radius:6px;cursor:pointer}
.btn2{background:#f0f0f0;color:#222}
.btn:disabled{opacity:.6;cursor:not-allowed}
.card{border:1px solid #ddd;border-radius:8px;padding:12px;margin-top:12px;white-space:pre-wrap;background:#fff}
.small{font-size:12px;color:#666}
.tabs{display:flex;gap:6px;margin:10px 0 12px}.tab{padding:8px 10px;border:1px solid #d0d0d0;background:#fff;border-radius:6px;cursor:pointer;font-size:13px}.tab.active{background:#0078d4;color:#fff;border-color:#0078d4}
.section{display:none}.section.active{display:block}
.list{margin:0;padding-left:18px}.muted{color:#666;font-size:12px}
</style></head><body>
<h2>📬 Email Triage AI</h2>
<div class="tabs"><button class="tab active" data-tab="analyze">Analýza</button><button class="tab" data-tab="settings">Nastavení</button><button class="tab" data-tab="rules">Pravidla</button></div>

<div id="analyze" class="section active">
  <div class="row"><button class="btn btn2" onclick="loadFromSettings()">Načíst uložené nastavení</button> <button class="btn" onclick="analyzeCurrent()">Analyzovat e-mail</button></div>
  <div id="out" class="card" style="display:none"></div>
</div>

<div id="settings" class="section">
  <div class="row"><label>Backend URL</label><input id="apiUrl" placeholder="https://...render.com"></div>
  <div class="row"><label>API key (volitelné)</label><input id="apiKey" type="password"></div>
  <div class="row"><label>Model</label><select id="model"><option value="gpt-4o-mini">gpt-4o-mini</option><option value="gpt-4o">gpt-4o</option></select></div>
  <div class="row"><label>Automaticky načíst při startu</label><select id="autoload"><option value="yes">Ano</option><option value="no">Ne</option></select></div>
  <div class="row"><button class="btn" onclick="saveCfg()">Uložit do Outlooku</button></div>
  <div class="small">Ukládá se do Outlook roaming settings, takže se nastavení přenese mezi zařízeními v rámci profilu.</div>
</div>

<div id="rules" class="section">
  <div class="row"><label>Custom prompt</label><textarea id="customPrompt" rows="12" placeholder="Napište pravidla pro prioritizaci, deadline, odpovědi..."></textarea></div>
  <div class="row"><label>Preferovaní odesílatelé</label><textarea id="prioritySenders" rows="5" placeholder="dekan@...
rektor@...
it@..."></textarea></div>
  <div class="row"><label>Šablony prioritizace</label><select id="promptTemplate" onchange="applyTemplate()"><option value="">-- vybrat --</option><option value="university">Univerzita / administrativa</option><option value="it">IT provoz</option><option value="student">Studenti / výuka</option></select></div>
  <div class="row"><button class="btn btn2" onclick="saveRules()">Uložit pravidla</button></div>
  <div class="small">Tip: custom prompt může obsahovat konkrétní instrukce typu „vyžaduj odpověď u děkana, vedení, studentů s deadline do 48 hodin".</div>
</div>

<script>
const ROAMING_KEYS = {
  apiUrl:'apiUrl', apiKey:'apiKey', model:'model', customPrompt:'customPrompt', prioritySenders:'prioritySenders', autoload:'autoload'
};
let cfg = {apiUrl:'',apiKey:'',model:'gpt-4o-mini',customPrompt:'',prioritySenders:'',autoload:'yes'};

function tabs(){document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));t.classList.add('active');document.getElementById(t.dataset.tab).classList.add('active')}))}
function setVal(id,val){document.getElementById(id).value = val ?? ''}
function getVal(id){return document.getElementById(id).value}
function saveToRoaming(){const rs=Office.context.roamingSettings; Object.entries(cfg).forEach(([k,v])=>rs.set(k,v)); rs.saveAsync(()=>{})}
function loadFromRoaming(){const rs=Office.context.roamingSettings; cfg={}; Object.values(ROAMING_KEYS).forEach(k=>cfg[k]=rs.get(k)||cfg[k]||''); setVal('apiUrl',cfg.apiUrl); setVal('apiKey',cfg.apiKey); setVal('model',cfg.model||'gpt-4o-mini'); setVal('customPrompt',cfg.customPrompt); setVal('prioritySenders',cfg.prioritySenders); setVal('autoload',cfg.autoload||'yes')}
function syncFromInputs(){cfg.apiUrl=getVal('apiUrl').replace(/\/$/,''); cfg.apiKey=getVal('apiKey'); cfg.model=getVal('model'); cfg.customPrompt=getVal('customPrompt'); cfg.prioritySenders=getVal('prioritySenders'); cfg.autoload=getVal('autoload')}
function saveCfg(){syncFromInputs(); saveToRoaming(); show('Uloženo do Outlooku.')}
function saveRules(){syncFromInputs(); saveToRoaming(); show('Pravidla uložena.')}
function loadFromSettings(){loadFromRoaming(); show('Nastavení načteno.')}

function renderAnalysis(data){
  const html = `
    <div><strong>Priorita:</strong> ${data.priority || ''}</div>
    <div><strong>Kategorie:</strong> ${data.category || ''}</div>
    <div style="margin-top:8px"><strong>Souhrn:</strong><br>${escapeHtml(data.summary || '')}</div>
    <div style="margin-top:8px"><strong>Odpověď:</strong><br>${escapeHtml(data.suggested_reply || '')}</div>
    <div style="margin-top:10px"><button class="btn btn2" onclick="insertReply()">Vložit odpověď do reply okna</button></div>
  `;
  show(html, true);
  lastReplyText = data.suggested_reply || '';
}

let lastReplyText = '';
function show(x, raw=false){const o=document.getElementById('out'); o.style.display='block'; o.innerHTML = raw ? x : escapeHtml(x)}
function escapeHtml(t){return (t||'').replace(/[&<>"]+/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function insertReply(){
  const reply = lastReplyText || '';
  const item = Office.context.mailbox.item;
  if (!reply) { show('Není co vložit.'); return; }
  if (item && item.displayReplyForm) {
    item.displayReplyForm(reply);
    return;
  }
  if (item && item.body && item.body.setSelectedDataAsync) {
    item.body.setSelectedDataAsync(reply, { coercionType: Office.CoercionType.Text }, function(){ show('Odpověď vložena.'); });
    return;
  }
  show('Váš Outlook nepodporuje přímé vložení v tomto režimu.');
}

function headers(){const h={'Content-Type':'application/json'}; if(cfg.apiKey) h['Authorization']='Bearer '+cfg.apiKey; return h}
function analyzeCurrent(){syncFromInputs(); if(!cfg.apiUrl){show('Nejprve nastavte Backend URL v Nastavení.'); return;} const item=Office.context.mailbox.item; if(!item){show('Žádný otevřený e-mail'); return;} item.body.getAsync(Office.CoercionType.Text, async r=>{ if(r.status!==Office.AsyncResultStatus.Succeeded){show('Nelze přečíst tělo e-mailu'); return;} const payload={subject:item.subject,from:item.from?item.from.displayName+' <'+item.from.emailAddress+'>':'',date:item.dateTimeCreated?item.dateTimeCreated.toISOString():'',body:r.value,model:cfg.model,customPrompt:cfg.customPrompt,prioritySenders:cfg.prioritySenders.split(/\r?\n|,/).map(s=>s.trim()).filter(Boolean)}; try { const resp=await fetch(cfg.apiUrl+'/analyze',{method:'POST',headers:headers(),body:JSON.stringify(payload)}); const data=await resp.json(); if(!resp.ok){show(data.error || 'Chyba backendu.'); return;} renderAnalysis(data); } catch(e){ show('Síťová chyba: '+(e && e.message ? e.message : e)); } });}
function applyTemplate(){const t=getVal('promptTemplate'); const templates={university:'Jsi e-mailový asistent pro univerzitní prostředí. Prioritizuj zprávy od vedení, děkana, studijního oddělení, garantů předmětů a IT podpory. Vždy označ jako P0/P1 zprávy s termínem do 48 hodin, žádosti o schválení nebo provozní incidenty. Ostatní informační zprávy dej do P2 nebo P3. Napiš krátký souhrn a pokud je potřeba reakce, navrhni zdvořilou odpověď v češtině.', it:'Jsi e-mailový asistent pro IT provoz. Prioritizuj incidenty, výpadky, požadavky na přístup, bezpečnostní události a e-maily s konkrétním SLA či deadlinem. Zprávy od klíčových interních adres považuj za vysokou prioritu. Navrhni stručnou technickou odpověď.', student:'Jsi e-mailový asistent pro výuku. Prioritizuj e-maily od studentů, vyučujících a studijního oddělení, zejména pokud obsahují žádost, deadline nebo nutnost schválení. Neurgentní informační zprávy dej do nižší priority.'}; if(templates[t]){document.getElementById('customPrompt').value=templates[t]}} 
Office.onReady(()=>{tabs(); loadFromRoaming(); if((cfg.autoload||'yes')==='yes') { show('Nastavení načteno automaticky z Outlooku.'); }})
</script></body></html>
